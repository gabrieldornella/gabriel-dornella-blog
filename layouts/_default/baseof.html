<!doctype html>
<html lang="en">
<head>{{ partial "head.html" . }}</head>
<body>

    <div class="muted">Gabriel Dornella</div>
    <h1 style="margin: 8px 0 0;"><a href="{{ "/" | relURL }}">AI, leadership, and solution engineering</a></h1>
    <nav>
      {{ range .Site.Menus.main }}

    {{ block "main" . }}{{ end }}

  <footer>
    Built with Hugo and GitHub Pages.
  </footer>
</body>
</html>
